#       - Hvis kun ÉN tid: presenter som før med "Skal jeg booke den for deg?"
#       - Når kunden velger en tid: kall `select_timeslot(slot_number)` med nummeret kunden valgte (1, 2, 3 osv.)

#    5. ETTER TIMESLOT VALGT - SAMLE RESTERENDE DATA:
#       - Spør om navn og telefonnummer
#       - Deretter kall book_time() med alle data

